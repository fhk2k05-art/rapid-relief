<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapidRelief</title>

<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: black;
  align-items: center;
}

nav .logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

nav img {
  height: 40px;
  border-radius: 10px;
  box-shadow: 0 0 10px red;
}

nav h2 {
  color: red;
  margin: 0;
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

.hero {
  height: 80vh;
  background: url("https://images.unsplash.com/photo-1584438784894-089d6a62b8fa") center/cover;
  display: flex;
  align-items: center;
  padding-left: 50px;
}

.hero img {
  height: 80px;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 50px;
}

.hero button {
  padding: 15px;
  background: red;
  border: none;
  color: white;
}

.section {
  padding: 40px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
}

.grid button {
  width: 45%;
  margin: 10px;
  padding: 15px;
  background: #1e1e1e;
  color: white;
  border: none;
}

.sos {
  background: red;
  padding: 20px;
  width: 100%;
  font-size: 24px;
  border: none;
}

#map {
  height: 300px;
  margin-top: 20px;
  border-radius: 10px;
}

#alerts div {
  background: rgba(255,0,0,0.2);
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
}

#chatbot {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 300px;
  background: #1e1e1e;
  border-radius: 10px;
}

#chatMessages {
  height: 200px;
  overflow-y: auto;
  padding: 10px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="logo.png">
    <h2>RapidRelief</h2>
  </div>
</nav>

<div class="hero">
  <div>
    <img src="logo.png">
    <h1>Emergency Help Anytime</h1>
    <button onclick="scrollToSOS()">Send SOS</button>
  </div>
</div>

<div class="section" id="sosSection">

  <div class="grid">
    <button onclick="sendSOS('Medical')">Medical</button>
    <button onclick="sendSOS('Fire')">Fire</button>
    <button onclick="sendSOS('Crime')">Crime</button>
    <button onclick="sendSOS('Mechanical')">Mechanical</button>
  </div>

  <button class="sos" onclick="sendSOS('General')">SEND SOS</button>

  <p id="status"></p>

  <h3>Live Alerts</h3>
  <div id="alerts"></div>

  <div id="map"></div>
</div>

<div id="chatbot">
  <div id="chatMessages"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let userLocation = {};
let map;

navigator.geolocation.getCurrentPosition(pos => {
  userLocation = {
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  };

  map = new google.maps.Map(document.getElementById("map"), {
    center: userLocation,
    zoom: 13
  });

  new google.maps.Marker({
    position: userLocation,
    map: map
  });
});

function addMarker(alert){
  new google.maps.Marker({
    position: alert.location,
    map: map
  });
}

socket.on("allAlerts", data => data.forEach(addMarker));

socket.on("newSOS", alert => {
  addMarker(alert);
  const div = document.createElement("div");
  div.innerText = alert.type;
  document.getElementById("alerts").prepend(div);
});

function sendSOS(type){
  fetch('/sos',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type, location:userLocation})
  });

  document.getElementById("status").innerText = "SOS Sent";
}

function sendMessage(){
  const input = document.getElementById("chatInput");
  const msg = input.value;

  fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:msg})
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("chatMessages").innerHTML += "<div>"+data.reply+"</div>";
  });

  input.value="";
}

function scrollToSOS(){
  document.getElementById("sosSection").scrollIntoView();
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

</body>
</html>
